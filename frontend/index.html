<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoTrack System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>♻ EcoTrack System</h1>

  <select onchange="setRole(this.value)">
    <option value="user">User (Resident)</option>
    <option value="admin">Admin</option>
  </select>
</header>

<nav class="nav">
  <button onclick="showSection('schedule')">Schedules</button>
  <button onclick="showSection('complaints')">Complaints</button>
  <button onclick="showSection('notifications')">Notifications</button>
</nav>

<!-- ================= SCHEDULE ================= -->
<section id="schedule" class="section active">
  <h2>Schedules</h2>

  <div id="adminScheduleForm" style="display:none;">
    <input id="place" placeholder="Place">
    <input id="time" placeholder="Time">
    <input id="collector" placeholder="Collector Name">
    <button onclick="addSchedule()">Add Schedule</button>
  </div>

  <div id="scheduleList"></div>
</section>

<!-- ================= COMPLAINTS ================= -->
<section id="complaints" class="section">
  <h2>Complaints</h2>

  <textarea id="complaintText" placeholder="Write complaint..."></textarea>
  <button onclick="submitComplaint()">Submit</button>

  <div id="complaintList"></div>
</section>

<!-- ================= NOTIFICATIONS ================= -->
<section id="notifications" class="section">
  <h2>Notifications</h2>
  <div id="notificationList"></div>
</section>

<script src="script.js"></script>
</body>
</html>
